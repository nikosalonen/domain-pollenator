version: 2
updates:
  - package-ecosystem: npm
    directories:
      - "/"
      - "/lambda/domain-checker"
      - "/lambda/scheduler"
      - "/lambda/notification-sender"
    schedule:
      interval: weekly
    groups:
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      aws-cdk:
        patterns:
          - "aws-cdk"
          - "aws-cdk-lib"
          - "constructs"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
