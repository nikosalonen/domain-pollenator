name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Install Lambda dependencies
        run: |
          for dir in lambda/*/; do
            (cd "$dir" && npm ci)
          done

      - name: Typecheck
        run: npm run build

      - name: Test
        run: npm test

      - name: Synth
        run: npm run synth -- --quiet
